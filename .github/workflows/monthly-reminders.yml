name: Monthly Savings Reminders

on:
  schedule:
    - cron: '0 23 1 * *'
  workflow_dispatch:
    inputs:
      traveller_name:
        description: 'Send test email to specific traveller (leave blank for all)'
        required: false
        default: ''

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Send reminders
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SITE_URL: https://nsinfield557-ctrl.github.io/wc_travel_savers/
          TRAVELLER_NAME: ${{ github.event.inputs.traveller_name }}
        run: node scripts/send-reminders.mjs
